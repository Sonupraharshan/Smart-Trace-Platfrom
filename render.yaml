services:
  - type: web
    name: smart-trace-platform
    runtime: python
    plan: standard
    buildCommand: |
      pip install -r requirements.txt && \
      python manage.py collectstatic --noinput && \
      python manage.py migrate && \
      python scripts/ensure_models.py
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: smart-trace-platform.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://smart-trace-platform.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: DATABASE_URL
        fromDatabase:
          name: smart-trace-db
          property: connectionString
      - key: DEPLOYMENT_MODE
        value: "production"

databases:
  - name: smart-trace-db
    plan: starter
