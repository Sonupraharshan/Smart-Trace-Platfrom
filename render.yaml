services:
  - type: web
    name: smart-trace-platform
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: smart-trace-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true

databases:
  - name: smart-trace-db
    plan: free
